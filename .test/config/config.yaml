# path or URL to sample sheet (TSV format, columns: SampleName, Condition, Directory...)
samples: config/samples.tsv
project: RNAModProject
only_final_results: True
params:
  minimap2_transcriptome: " -ax map-ont -L --secondary=no -N 10 -p 0 "
  minimap2_genome: " -ax splice -u f -k 14 -G 500000 --secondary=no "
  samtools_filtering: " -F 2324 -q 10 --min-qlen 80 "
  f5c_eventalign_full: "--print-read-names --scale-events --min-mapq 0 --min-recalib-events 50 --samples --rna "
  f5c_eventalign_simple: "--signal-index --scale-events --min-recalib-events 50 --min-mapq 0 --rna "
  nanocompore: "--logit --min_ref_length 50 --overwrite --min_coverage 1 "
  baleen_modcall: "  --proba-threshold 0.9  --sample 100    "
  baleen_postcall: "  --proba-threshold 0.9 "
  xpore_dataprep: ""
  lafite: ""
  xpore: ""
  differr: " -f 2  --median-expr-threshold 0  --min-expr-threshold 0 "
  eligos2: "--max_depth 5000000 --min_depth 5 --esb 0 --oddR 0 --pval 1"
  epinano: ' -t 1  -c 5 -f sum_err  -d 0.01  '
  epinano_dataprep: ''
  drummer: ' -z 0.1 -p 1 '

threads:
  minimap2: 4
  slow5tools: 4
  f5c: 4
  nanocompore: 4
  baleen: 4
  xpore: 4
  sample_reads: 4
  differr: 4
  eligos2: 4
  drummer: 4
  epinano: 4

reference:
  genome_fasta: data/ref.fa
  transcriptome_fasta: data/ref.fa
  transcriptome_gtf: data/ref.gtf



tools:
  xpore:
    activate: True
  nanocompore:
    activate: True
  baleen:
    activate: True
  differr:
    activate: True
  drummer:
    activate: True
  eligos2:
    activate: True
  epinano:
    activate: True

target_region: ''