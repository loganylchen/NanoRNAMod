$schema: "http://json-schema.org/draft-06/schema#"

description: snakemake configuration file
type: object
properties:
  samples:
    type: string
  project:
    type: string
  reference:
    type: object
    properties:
      transcriptome_fasta:
        type: string
      genome_fasta:
        type: string
      transcriptome_gtf:
        type: string
    required:
      - transcriptome_fasta

  tools:
    type: object
    properties:
      xpore:
        type: object
        properties:
          activate:
            type: boolean
      nanocompore:
        type: object
        properties:
          activate:
            type: boolean
  params:
    type: object
    properties:
      minimap2:
        type: string
      samtools_filtering:
        type: string
      f5c_eventalign_full:
        type: string
      f5c_eventalign_simple:
        type: string
      nanocompore:
        type: string

  threads:
    type: object
    properties:
      minimap2:
        type: integer
      multi_to_single:
        type: integer
      tombo_lsc:
        type: integer
      tombo_msc:
        type: integer
      tombo_resquiggle:
        type: integer
      slow5tools:
        type: integer
      f5c:
        type: integer
      m6anet:
        type: integer
      nanocompore:
        type: integer



  benchmark:
    type: object
    properties:
      truth_set:
        type: string
      window:
        oneOf:
          - type: integer
          - type: array
            items:
              type: integer
      # Statistical analysis parameters
      n_bootstrap:
        type: integer
        minimum: 100
        default: 1000
        description: Number of bootstrap iterations for confidence intervals
      alpha:
        type: number
        minimum: 0
        maximum: 1
        default: 0.05
        description: Significance level for tests and CIs
      fdr_method:
        type: string
        enum: ["benjamini-hochberg", "bonferroni", "holm"]
        default: "benjamini-hochberg"
        description: FDR correction method for multiple testing
      # Sensitivity analysis parameters
      coverage_bins:
        type: array
        items:
          type: integer
        default: [0, 10, 20, 50, 100, 200, 500]
        description: Coverage depth bins for sensitivity analysis
      n_splits:
        type: integer
        minimum: 2
        default: 5
        description: Number of cross-validation splits for threshold robustness
      # Figure settings
      figure_theme:
        type: string
        enum: ["nature", "cell", "science"]
        default: "nature"
        description: Publication figure theme
      dpi:
        type: integer
        minimum: 72
        default: 300
        description: Figure resolution
      fig_format:
        type: string
        enum: ["pdf", "png", "svg"]
        default: "pdf"
        description: Figure output format
      # Supplementary materials
      include_supplementary:
        type: boolean
        default: true
        description: Generate supplementary materials
      data_export_format:
        type: string
        enum: ["tsv", "csv"]
        default: "tsv"
        description: Format for exported plotting data

required:
  - samples
  - project
  - params
  - reference
  - threads
  - tools








