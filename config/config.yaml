# path or URL to sample sheet (TSV format, columns: SampleName, Condition, Directory...)
samples: config/samples.tsv
project: ecoliRNA
only_final_results: true
qc: false
# Temp directory for all shell rules and subprocesses. Set to an absolute
# path or a path relative to the working directory. Defaults to "tmp" in
# the working directory to avoid filling up /tmp on shared systems.
tmpdir: tmp
params:
  minimap2_transcriptome: " -ax map-ont -L --secondary=no -N 10 -p 0 "
  minimap2_genome: " -ax splice -u f -k 14 -G 500000 --secondary=no "
  samtools_filtering: " -F 2324 -q 10 --min-qlen 80 "
  f5c_eventalign_full: "--print-read-names --scale-events --samples --rna "
  f5c_eventalign_simple: "--signal-index --scale-events --rna "
  # nanocompore: "--logit --min_ref_length 50 --overwrite --min_coverage 1 "
  nanocompore: "--logit  --overwrite "
  baleen_modcall: "   "
  baleen_postcall: "   "
  xpore_dataprep: ""
  lafite: ""
  xpore: ""
  differr: " -f 2  --median-expr-threshold 0  --min-expr-threshold 0 "
  # eligos2: "--max_depth 5000000 --min_depth 5 --esb 0 --oddR 0 --pval 1"
  eligos2: "--max_depth 5000000  --esb 0 --oddR 0 --pval 1"
  epinano: '-f sum_err'
  epinano_dataprep: ''
  drummer: ' -z 0.1 -p 2 '
  tandemmod: "--model multi --threshold 0.5"
  directrm: "--mods all --min-prob 0.7"
  m6atm: "--stoichiometry --threshold 0.6"
  rnano: "--model pretrained --gpu False"
  psipore: ""
  nanopsu: ""
  nanomud: ""
  nanomud_mods: "Psi,m1Psi"
  penguin: ""
  pybaleen: ""

# Thread configuration for each tool
# 每个工具的线程数配置
# - default: 默认线程数，当工具没有特定配置时使用
# - 其他工具: 指定该工具运行时使用的线程数
threads:
  default: 1
  minimap2: 4
  slow5tools: 4
  f5c: 4
  nanocompore: 4
  baleen: 4
  xpore: 4
  sample_reads: 4
  differr: 4
  eligos2: 4
  drummer: 4
  epinano: 4
  tandemmod: 4
  directrm: 4
  m6atm: 4
  rnano: 4
  psipore: 4
  nanopsu: 4
  nanomud: 4
  penguin: 4
  pybaleen: 4

# Container images for each tool
# 每个工具的容器镜像配置
# 使用方法:
#   1. 所有规则都会使用容器来运行 (when using --use-singularity or --use-conda --use-singularity)
#   2. default: 默认容器镜像，当工具没有指定容器或容器为空字符串时使用
#   3. 为特定工具指定容器: 将对应工具的值改为容器镜像地址
#      例如: xpore: "docker://biocontainers/xpore:1.0"
#   4. 如果某个工具的值为空字符串 ""，则会使用 default 容器
#   5. 容器镜像格式: "docker://registry/image:tag" 或 "shub://user/repo:tag"
#
# 示例:
#   containers:
#     default: "docker://condaforge/mambaforge:22.11.1-4"
#     xpore: "docker://myregistry/xpore:latest"        # 为xpore指定特定容器
#     minimap2: "docker://biocontainers/minimap2:2.24" # 为minimap2指定特定容器
#     nanocompore: ""                                   # 空字符串，使用default容器
containers:
  default: "docker://condaforge/mambaforge:22.11.1-4"
  minimap2: "docker://btrspg/minimap2:2.28"
  slow5tools: "docker://btrspg/slow5tools:1.3.0"
  f5c: "docker://btrspg/f5c:1.5"
  nanocompore: "docker://btrspg/nanocompore1:1.0.4"
  baleen: "docker://btrspg/baleen:clean"
  xpore: "docker://btrspg/xpore:2.1"
  differr: "docker://btrspg/differr:0.2"
  eligos2: "docker://btrspg/eligos2:2.1.0"
  drummer: "docker://btrspg/drummer:92bb35a4a2b22ff304f5e4bcbc9fa6985f18a12e"
  epinano: "docker://btrspg/epinano:1.2.0"
  bedtools: "docker://btrspg/bedtools:2.31.1"
  tandemmod: "docker://btrspg/tandemmod:1.0.0"
  directrm: "docker://btrspg/directrm:1.0.0"
  m6atm: "docker://btrspg/m6atm:1.0.0"
  rnano: "docker://btrspg/rnano:1.0.0"
  psipore: "docker://btrspg/psipore:1.0.0"
  nanopsu: "docker://btrspg/nanopsu:1.0.0"
  pybaleen: "docker://btrspg/py-baleen-gpu:dev"
  nanomud: "docker://btrspg/nanomud:1.0.0"
  penguin: "docker://btrspg/penguin:1.0.0"
  samtools: "docker://btrspg/minimap2:2.28"
  nanopolish: "docker://btrspg/nanopolish:0.14.0"
  nanocount: "docker://btrspg/nanocount:1.0.0"
  qualimap: "docker://btrspg/qualimap:2.2.2a"
  python3: "docker://btrspg/misc-python3:2026-04-01"
  nanoplot: ""
  bcftools: ""
  r_viz: "docker://btrspg/rlan:20260116"
  picard: "docker://broadinstitute/picard:3.1.0"

reference:
  genome_fasta: ecoli_ref/ref.fa
  transcriptome_fasta: ecoli_ref/ref.fa
  transcriptome_gtf: ''



tools:
  xpore:
    activate: false
  nanocompore:
    activate: false
  baleen:
    activate: false
  differr:
    activate: false
  drummer:
    activate: false
  eligos2:
    activate: false
  epinano:
    activate: false
  tandemmod:
    activate: false
  directrm:
    activate: false
  m6atm:
    activate: false
  rnano:
    activate: false
  psipore:
    activate: false
  nanopsu:
    activate: false
  nanomud:
    activate: false
  penguin:
    activate: false
  pybaleen:
    activate: true

target_region: ''
